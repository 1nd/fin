schema: spec-driven

# Project context (optional)
# This is shown to AI when creating artifacts.
context: |
  Tech stack: React Native + Expo (SDK 57), expo-router, TypeScript.
  Package manager: npm (decided July 2026). Chosen over pnpm because Fin is a
  single-package Expo app and pnpm's isolated node_modules still has friction
  with some React Native native modules. Revisit if the repo becomes a
  monorepo or CI install time becomes a problem.

